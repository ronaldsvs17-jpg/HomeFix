<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeFix - Iniciar Sesión</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#ffffff;
            padding:15px;
        }

        .contenedor{
            width:100%;
            max-width:380px;
            background:#e8e8e8;
            border-radius:30px;
            padding:30px 20px;
        }

        .logo{
            text-align:center;
            color:#2dbd2d;
            font-size:40px;
            font-weight:bold;
            letter-spacing:2px;
            margin-bottom:70px;
        }

        h2{
            font-size:16px;
            margin-bottom:15px;
        }

        .campo{
            width:100%;
            height:45px;
            border:1px solid #bdbdbd;
            border-radius:12px;
            padding:0 15px;
            margin-bottom:12px;
            outline:none;
        }

        .btn-login{
            width:100%;
            height:45px;
            border:none;
            border-radius:30px;
            background:#5867e8;
            color:white;
            font-weight:bold;
            cursor:pointer;
            margin-top:10px;
        }

        .btn-login:hover{
            opacity:.9;
        }

        .olvide{
            display:block;
            text-align:center;
            text-decoration:none;
            color:black;
            font-size:12px;
            margin:25px 0 45px;
        }

        .btn-crear{
            width:100%;
            height:45px;
            border:2px solid #5867e8;
            border-radius:30px;
            background:white;
            color:#5867e8;
            font-weight:bold;
            cursor:pointer;
        }

        @media(max-width:480px){

            .logo{
                font-size:34px;
            }

            .contenedor{
                padding:25px 15px;
            }

        }

    </style>
</head>

<body>

    <div class="contenedor">

        <h1 class="logo">HOMEFIX</h1>

        <h2>Iniciar sesión en Homefix</h2>

        <input
            type="text"
            class="campo"
            placeholder="Correo o número de celular">

        <input
            type="password"
            class="campo"
            placeholder="Contraseña">

        <button class="btn-login">
            Iniciar sesión
        </button>

        <a href="#" class="olvide">
            ¿Olvidaste tu contraseña?
        </a>

        <button class="btn-crear">
            Crea una cuenta
        </button>

    </div>
    
    
    <script>

const correo = document.querySelector('input[type="text"]');
const password = document.querySelector('input[type="password"]');
const btnLogin = document.querySelector('.btn-login');
const btnCrear = document.querySelector('.btn-crear');

btnLogin.addEventListener('click', function(){

    if(correo.value.trim() === '' || password.value.trim() === ''){
        alert('Debes completar todos los campos');
        return;
    }

    alert('Inicio de sesión exitoso');

    // Redireccionar al dashboard
    // window.location.href = "dashboard.html";

});

btnCrear.addEventListener('click', function(){
    window.location.href = "crear_cuenta.html";
});

</script>

</body>

</html>
