       <!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeFix - Crear Cuenta</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    padding:15px;
}

.contenedor{
    width:100%;
    max-width:420px;
    background:#e8e8e8;
    border-radius:30px;
    padding:20px;
}

.logo{
    text-align:right;
    color:#2dbd2d;
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

h2{
    margin-bottom:10px;
}

.descripcion{
    font-size:12px;
    color:#555;
    line-height:1.5;
    margin-bottom:15px;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:6px;
    font-weight:bold;
}

.fila{
    display:flex;
    gap:10px;
}

input,
select{
    width:100%;
    height:42px;
    border:1px solid #ccc;
    border-radius:10px;
    padding:0 10px;
    background:white;
}

.roles{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.rol{
    display:flex;
    align-items:center;
    gap:6px;
}

.btn{
    width:100%;
    height:45px;
    border:none;
    border-radius:25px;
    background:#5867e8;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:25px;
}

.btn-volver{
    width:100%;
    height:45px;
    margin-top:10px;
    border:2px solid #5867e8;
    border-radius:25px;
    background:white;
    color:#5867e8;
    font-weight:bold;
    cursor:pointer;
}

@media(max-width:480px){

    .fila{
        flex-direction:column;
    }

    .roles{
        flex-direction:column;
        gap:10px;
    }

}

</style>

</head>

<body>

<div class="contenedor">


<div class="logo">HOMEFIX</div>

<h2>Empieza a usar HomeFix</h2>

<p class="descripcion">
    Crea tu cuenta para acceder a la plataforma que conecta trabajadores domésticos y empleadores.
</p>

<label>Nombre</label>

<div class="fila">
    <input type="text" id="nombre" placeholder="Nombre">
    <input type="text" id="apellido" placeholder="Apellido">
</div>

<label>Fecha de nacimiento</label>

<div class="fila">

    <select id="dia">
        <option value="">Día</option>
    </select>

    <select id="mes">
        <option value="">Mes</option>
        <option>Enero</option>
        <option>Febrero</option>
        <option>Marzo</option>
        <option>Abril</option>
        <option>Mayo</option>
        <option>Junio</option>
        <option>Julio</option>
        <option>Agosto</option>
        <option>Septiembre</option>
        <option>Octubre</option>
        <option>Noviembre</option>
        <option>Diciembre</option>
    </select>

    <select id="anio">
        <option value="">Año</option>
    </select>

</div>

<label>Género</label>

<select id="genero">
    <option value="">Selecciona tu género</option>
    <option>Hombre</option>
    <option>Mujer</option>
</select>

<label>Correo o número celular</label>

<input
    type="text"
    id="correo"
    placeholder="Correo o número celular">

<label>Rol</label>

<div class="roles">

    <div class="rol">
        <input type="radio" name="rol" value="Empleado">
        <span>Empleado</span>
    </div>

    <div class="rol">
        <input type="radio" name="rol" value="Empleador">
        <span>Empleador</span>
    </div>

    <div class="rol">
        <input type="radio" name="rol" value="Administrador">
        <span>Administrador</span>
    </div>

</div>

<label>Contraseña</label>

<div class="fila">

    <input
        type="password"
        id="password"
        placeholder="Contraseña">

    <input
        type="password"
        id="confirmar"
        placeholder="Confirmar contraseña">

</div>

<button class="btn" id="registrar">
    Crear cuenta
</button>

<button class="btn-volver" id="volver">
    Volver al inicio de sesión
</button>


</div>

<script>

// Días
const dia = document.getElementById("dia");

for(let i = 1; i <= 31; i++){

    const option = document.createElement("option");
    option.value = i;
    option.textContent = i;

    dia.appendChild(option);
}

// Años
const anio = document.getElementById("anio");
const añoActual = new Date().getFullYear();

for(let i = añoActual; i >= 1950; i--){

    const option = document.createElement("option");
    option.value = i;
    option.textContent = i;

    anio.appendChild(option);
}

// Registro
document.getElementById("registrar")
.addEventListener("click",()=>{

    const nombre =
    document.getElementById("nombre").value;

    const apellido =
    document.getElementById("apellido").value;

    const correo =
    document.getElementById("correo").value;

    const password =
    document.getElementById("password").value;

    const confirmar =
    document.getElementById("confirmar").value;

    if(
        nombre === "" ||
        apellido === "" ||
        correo === "" ||
        password === "" ||
        confirmar === ""
    ){
        alert("Completa todos los campos");
        return;
    }

    if(password !== confirmar){
        alert("Las contraseñas no coinciden");
        return;
    }

    if(password.length < 8){
        alert("La contraseña debe tener mínimo 8 caracteres");
        return;
    }

    alert("Cuenta creada correctamente");

    window.location.href = "login.html";

});

// Volver
document.getElementById("volver")
.addEventListener("click",()=>{

    window.location.href = "inicio_sesion.html";

});

</script>

</body>
</html>


    </div>

</body>
</html>
